name: Docker Image CI Release

on:
  push:
    tags:
      - "v*.*.*"
  schedule:
    - cron: '0 4 * * 0' # This will run the workflow every Sunday at 4 am
  workflow_dispatch:


env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get the latest tag
        id: read2burn
        shell: bash
        run: |
          set -euo pipefail
          
          # Ensure we have tags from the remote
          git fetch --tags --force --unshallow || git fetch --tags --force

          # Log all tags to the console for debugging
          echo "Available tags:"
          git tag --list

          # We use '|| true' to prevent grep from killing the script if no match is found
          TAG=$(git tag --list | grep -E '^.+\.\d+\.\d+$' | sort -V | tail -n 1 || true)

          if [ -z "$TAG" ]; then
            echo "::error::No matching tags found for regex '^.+\.\d+\.\d+$'"
            exit 1
          fi

          echo "Found Tag: $TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
  
      - name: Checkout the latest tag if exists
        run: git checkout tags/${{ steps.read2burn.outputs.tag }}

      - name: Get the commit ID
        id: get_commit
        run: echo "commit=$(git rev-parse HEAD)" >> $GITHUB_ENV

      - name: Inject version and commit ID into index.ejs
        run: |
          VERSION=${{ steps.read2burn.outputs.tag }}
          COMMIT=${{ env.commit }}
          echo "<!-- Version: $VERSION, Commit ID: $COMMIT -->" >> views/index.ejs

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          # list of Docker images to use as base name for tags
          images: |
            wemove/read2burn
          tags: |
            type=semver,pattern={{version}},value=${{ steps.read2burn.outputs.tag }}
            type=semver,pattern={{major}},value=${{ steps.read2burn.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.read2burn.outputs.tag }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4


      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
    
      - name: Build and push
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64

          push: ${{ github.event_name != 'pull_request' }}
          file: docker/Dockerfile
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
