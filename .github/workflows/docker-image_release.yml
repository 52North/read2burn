name: Docker Image CI Release

on:
  push:
    tags:
      - "v*.*.*"
  schedule:
    - cron: '0 4 * * 0' # This will run the workflow every Sunday at 4 am
  workflow_dispatch:


env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get the latest tag
        id: read2burn
        shell: bash
        run: |
          set -euo pipefail

          # Only unshallow if the repository is actually shallow
          if [ "$(git rev-parse --is-shallow-repository)" = "true" ]; then
            echo "Repository is shallow. Unshallowing..."
            git fetch --tags --force --unshallow
          else
            echo "Repository is already complete. Fetching tags..."
            git fetch --tags --force
          fi

          # 1. We use [0-9] instead of \d for compatibility
          # 2. We use '|| true' so grep failing doesn't kill the script before our custom error message
          TAG=$(git tag --list | grep -E '^v?[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n 1 || true)

          if [ -z "$TAG" ]; then
            echo "::error::No matching tags found. Checked tags: $(git tag --list | tr '\n' ' ')"
            exit 1
          fi

          echo "Selected Tag: $TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
  
      - name: Checkout the latest tag if exists
        run: git checkout tags/${{ steps.read2burn.outputs.tag }}

      - name: Get the commit ID
        id: get_commit
        run: echo "commit=$(git rev-parse HEAD)" >> $GITHUB_ENV

      - name: Inject version and commit ID into index.ejs
        run: |
          VERSION=${{ steps.read2burn.outputs.tag }}
          COMMIT=${{ env.commit }}
          echo "<!-- Version: $VERSION, Commit ID: $COMMIT -->" >> views/index.ejs

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          # list of Docker images to use as base name for tags
          images: |
            wemove/read2burn
          tags: |
            type=semver,pattern={{version}},value=${{ steps.read2burn.outputs.tag }}
            type=semver,pattern={{major}},value=${{ steps.read2burn.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.read2burn.outputs.tag }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4


      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
    
      - name: Build and push
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64

          push: ${{ github.event_name != 'pull_request' }}
          file: docker/Dockerfile
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
